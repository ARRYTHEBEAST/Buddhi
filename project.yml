name: Buddhi
options:
  bundleIdPrefix: com.arrythebeast
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.arrythebeast.Buddhi
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    INFOPLIST_FILE: Buddhi/Info.plist

targets:
  Buddhi:
    type: application
    platform: iOS
    sources:
      - path: Buddhi
    resources:
      - path: Buddhi/Assets.xcassets
    info:
      path: Buddhi/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserNotificationsUsageDescription: "Buddhi sends reminders to read your meditation notes."
